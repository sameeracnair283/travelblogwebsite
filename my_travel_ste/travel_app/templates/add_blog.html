<!DOCTYPE html>
<html>
<head><title>Delete</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body class="container mt-5 text-center">
  <h2>Are you sure you want to delete "{{ dest.title }}"?</h2>
  <form method="POST">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger">Yes, Delete</button>
    <a href="/" class="btn btn-secondary">Cancel</a>
  </form>
</body>
</html>
