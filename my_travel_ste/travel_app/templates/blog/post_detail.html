{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ post.title }} - The Drifting Quill</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@700&family=Inter:wght@400&display=swap" rel="stylesheet">
  <style>
    body { 
      font-family: 'Inter', sans-serif !important; 
      background-color: #FDFBF7 !important; 
      margin: 0 !important; 
      color: #1E1E1E !important; 
    }
    .yellow-bar { 
      background-color: #F5C542 !important; 
      padding: 9px 4.5% !important; 
      display: flex !important; 
      justify-content: space-between !important; 
      align-items: center !important; 
      position: sticky !important; 
      top: 0 !important; 
      z-index: 1000 !important; 
    }
    .logo-text { 
      font-family: 'EB Garamond', serif !important; 
      font-weight: 700 !important; 
      font-size: 13.5px !important; 
      line-height: 1 !important; 
    }
    .logo-text .small { 
      font-size: 9.5px !important; 
      display: block !important; 
    }
    .logo-text a {
      color: #1E1E1E !important;
      text-decoration: none !important;
    }
    .post-title { 
      font-family: 'EB Garamond', serif !important; 
      font-size: 62px !important; 
      font-weight: 700 !important; 
      line-height: 0.88 !important; 
      color: #1E1E1E !important; 
      padding: 32px 4.5% 16px !important; 
      margin: 0 !important;
    }
    .main-img { 
      width: 100% !important; 
      height: 500px !important; 
      object-fit: cover !important;
      display: block !important;
    }
    .blue-box { 
      background-color: #4338CA !important; 
      color: #FFFFFF !important; 
      padding: 40px 4.5% !important; 
      font-size: 18px !important; 
      line-height: 1.7 !important;
    }
    .content-wrap {
      max-width: 800px !important;
      margin: 0 auto !important;
    }
    .small-img-container { 
      width: 400px !important; 
      height: 400px !important; 
      overflow: hidden !important; 
      margin: 40px auto 0 !important; 
    }
    .small-img { 
      width: 100% !important; 
      height: 100% !important; 
      object-fit: cover !important; 
    }
    .back-btn {
      color: #4338CA !important;
      font-weight: 600 !important;
      text-decoration: none !important;
      display: inline-block !important;
      margin: 30px 4.5% !important;
      font-size: 16px !important;
    }
    @media(max-width: 768px) { 
      .post-title { font-size: 38px !important; } 
      .main-img { height: 300px !important; } 
      .blue-box { font-size: 16px !important; padding: 30px 4.5% !important; }
      .small-img-container { width: 100% !important; height: 300px !important; }
    }
  </style>
</head>
<body>
  <!-- Yellow Header -->
  <div class="yellow-bar">
    <div class="logo-text">
      <a href="/">
        <span class="small">The</span>
        Drifting<br>Quill
      </a>
    </div>
  </div>

  <!-- Post Title -->
  <h1 class="post-title">{{ post.title }}</h1>
  
  <!-- Main Image -->
  {% if post.main_image %}
    <img src="{{ post.main_image.url }}" class="main-img" alt="{{ post.title }}">
  {% endif %}
  
  <!-- Blue Content Box - FULL DESCRIPTION -->
  <div class="blue-box">
    <div class="content-wrap">
      <p>{{ post.description|linebreaks }}</p>
      
      <!-- Small Image -->
      {% if post.small_image %}
      <div class="small-img-container">
        <img src="{{ post.small_image.url }}" class="small-img" alt="{{ post.title }}">
      </div>
      {% endif %}
    </div>
  </div>

  <a href="/" class="back-btn">← Back to All Stories</a>

</body>
</html>
